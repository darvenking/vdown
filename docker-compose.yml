version: '3.8'

services:
  vdown:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/vdown}:latest
    container_name: vdown
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 下载目录挂载 - 持久化存储
      - ./downloads:/app/downloads
      # 数据库文件挂载 - 持久化任务记录
      - ./db.json:/app/db.json
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - DOWNLOADS_DIR=/app/downloads
      - DOWNLOAD_CONCURRENCY=10
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
